name: FX Analysis Pipeline

on:
  schedule:
    # Weekly: Monday 10:00 JST = Monday 01:00 UTC (skip 1st of month — handled by monthly)
    - cron: '0 1 * * 1'
    # Monthly: 1st of each month at 10:30 JST = 01:30 UTC
    # Offset by 30 min to avoid collision when 1st falls on Monday.
    # The monthly pipeline also generates weekly reports, so weekly is redundant on that day.
    - cron: '30 1 1 * *'
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: 'Pipeline mode: weekly or monthly'
        required: false
        default: ''
      report_date:
        description: 'Report date (YYYYMMDD). Leave empty for today JST.'
        required: false
        default: ''

permissions:
  contents: write   # needed to push to fx-daily-data branch

jobs:
  run-analysis-pipeline:
    runs-on: ubuntu-latest

    env:
      FX_DATA_BRANCH: ${{ vars.FX_DATA_BRANCH || 'fx-daily-data' }}
      FX_CSV_OUTPUT_DIR: ${{ github.workspace }}/data/csv
      FX_WEEK_DAYS: '5'
      FX_MONTH_DAYS: '20'
      FX_PAIR: 'USDJPY'

    steps:
      - name: Determine pipeline mode
        id: detect-mode
        run: |
          # Manual dispatch overrides auto-detection
          MANUAL_MODE="${{ github.event.inputs.pipeline_mode }}"
          if [ -n "$MANUAL_MODE" ]; then
            echo "mode=$MANUAL_MODE" >> "$GITHUB_OUTPUT"
            echo "Pipeline mode (manual): $MANUAL_MODE"
            exit 0
          fi

          # Auto-detect from schedule
          CRON="${{ github.event.schedule }}"
          if [ "$CRON" = "30 1 1 * *" ]; then
            echo "mode=monthly" >> "$GITHUB_OUTPUT"
            echo "Pipeline mode (auto): monthly (1st of month)"
            exit 0
          fi

          # Weekly cron on 1st of month: skip (monthly cron at 01:30 will cover it).
          # Only applies to scheduled events; workflow_dispatch always proceeds.
          if [ -n "$CRON" ]; then
            DAY_OF_MONTH=$(date -u +%d)
            if [ "$DAY_OF_MONTH" = "01" ]; then
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "Skipping weekly: 1st of month will be handled by monthly cron"
              exit 0
            fi
          fi

          echo "mode=weekly" >> "$GITHUB_OUTPUT"
          echo "Pipeline mode (auto): weekly"

      - name: Check out code branch
        if: steps.detect-mode.outputs.mode != 'skip'
        uses: actions/checkout@v4
        with:
          path: code

      - name: Check out data branch
        if: steps.detect-mode.outputs.mode != 'skip'
        id: checkout-data
        run: |
          clone_output=$(git clone \
            --branch "$FX_DATA_BRANCH" \
            --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data 2>&1) && {
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if echo "$clone_output" | grep -qiE "remote branch .* not found|could not find remote branch"; then
            echo "Data branch '$FX_DATA_BRANCH' not found. Skipping analysis pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::git clone failed: $clone_output"
          exit 1

      - name: Set up Python 3.11
        if: steps.detect-mode.outputs.mode != 'skip' && steps.checkout-data.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: code/pyproject.toml

      - name: Install project
        if: steps.detect-mode.outputs.mode != 'skip' && steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run analysis pipeline
        if: steps.detect-mode.outputs.mode != 'skip' && steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        env:
          FX_PIPELINE_MODE: ${{ steps.detect-mode.outputs.mode }}
          FX_REPORT_DATE: ${{ github.event.inputs.report_date || '' }}
        run: |
          python scripts/run_fx_analysis_pipeline.py

      - name: Commit and push data branch if changed
        if: steps.detect-mode.outputs.mode != 'skip' && steps.checkout-data.outputs.skip != 'true'
        working-directory: data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            MODE="${{ steps.detect-mode.outputs.mode }}"
            git commit -m "FX analysis pipeline ($MODE) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:"$FX_DATA_BRANCH"
            echo "Data branch updated with analysis pipeline artifacts."
          fi
