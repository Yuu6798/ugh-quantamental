name: CI

on:
  pull_request:
  push:
  # Run CI after the review-autofix bot pushes a commit.
  # GitHub blocks GITHUB_TOKEN-pushed commits from triggering pull_request/push
  # events (anti-loop mechanism), so workflow_run is the only way to get a CI
  # check on bot commits without a PAT.
  workflow_run:
    workflows: ["Review Autofix Bot"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  test:
    if: >-
      (github.event_name == 'pull_request' && github.base_ref == github.event.repository.default_branch)
      || (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
      || github.event_name == 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------------------------
      # Resolve the exact commit the bot pushed, not just the branch tip.
      # The bot's review-autofix workflow uploads an "autofix-sha" artifact
      # containing `git rev-parse HEAD` captured immediately after any push.
      # Downloading it here gives us an immutable revision that is immune to
      # the race where a human commit lands on the branch between bot completion
      # and CI checkout.  Falls back to head_branch when the artifact is absent
      # (e.g. pull_request / push triggers, or a non-pushing bot run).
      # -------------------------------------------------------------------------
      - name: Download autofix commit SHA artifact
        if: github.event_name == 'workflow_run'
        id: dl-sha
        uses: actions/download-artifact@v4
        with:
          name: autofix-sha
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/autofix-sha
        continue-on-error: true

      - name: Resolve checkout ref
        if: github.event_name == 'workflow_run'
        id: resolve-ref
        run: |
          if [ -f /tmp/autofix-sha/autofix-sha.txt ]; then
            sha=$(tr -d '[:space:]' < /tmp/autofix-sha/autofix-sha.txt)
            echo "ref=${sha}" >> "$GITHUB_OUTPUT"
            echo "Resolved immutable autofix SHA: ${sha}"
          else
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "Artifact absent — falling back to head_branch"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # For workflow_run: use the immutable SHA captured by the bot immediately
          # after its push (downloaded from the autofix-sha artifact).  Falls back
          # to head_branch if the artifact is absent.  repository points at the
          # head repository so fork PRs resolve correctly.
          repository: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name || github.repository }}
          ref: ${{ github.event_name == 'workflow_run' && steps.resolve-ref.outputs.ref || github.sha }}
          # Enough history for the loop guard to inspect consecutive bot commits.
          fetch-depth: 10

      # ---------------------------------------------------------------------------
      # Loop guard — only active when triggered via workflow_run (bot push path).
      # Counts consecutive commits authored by github-actions[bot] starting from
      # HEAD.  If the count reaches the limit we fail immediately so that a
      # misbehaving bot cannot push indefinitely.
      #
      # Review Autofix Bot is triggered only by review comment events, never by
      # CI completion, so no circular feedback loop exists.  Reviewers can
      # legitimately leave several comments in one session, resulting in multiple
      # consecutive bot commits on a single PR.  A limit of 5 allows normal
      # multi-comment autofix flows while still catching any runaway scenario.
      # Threshold: 5 consecutive bot commits → CI error.
      # ---------------------------------------------------------------------------
      - name: Loop guard — stop on consecutive bot commits
        if: github.event_name == 'workflow_run'
        run: |
          limit=5
          count=0
          while IFS= read -r author_email; do
            case "$author_email" in
              *github-actions*)
                count=$((count + 1))
                ;;
              *)
                break
                ;;
            esac
          done < <(git log --format="%ae" -"${limit}")
          echo "Consecutive github-actions[bot] commits from HEAD: ${count}"
          if [ "${count}" -ge "${limit}" ]; then
            echo "::error::Loop guard triggered: ${count} consecutive github-actions[bot] commits detected. Stopping CI to prevent a runaway bot scenario."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
