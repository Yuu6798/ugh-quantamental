name: FX Weekly Report v2

on:
  # Schedule disabled — weekly analysis is now handled by fx-analysis-pipeline.yml
  # to avoid duplicate cron runs and push races on the fx-daily-data branch.
  # Retained for manual dispatch only.
  workflow_dispatch:

permissions:
  contents: write   # needed to push to fx-daily-data branch

jobs:
  run-weekly-report:
    runs-on: ubuntu-latest

    env:
      FX_DATA_BRANCH: ${{ vars.FX_DATA_BRANCH || 'fx-daily-data' }}
      FX_CSV_OUTPUT_DIR: ${{ github.workspace }}/data/csv
      FX_WEEK_DAYS: '5'

    steps:
      - name: Check out code branch
        uses: actions/checkout@v4
        with:
          path: code

      - name: Check out data branch
        id: checkout-data
        run: |
          # Attempt clone; distinguish "branch not found" from other errors.
          clone_output=$(git clone \
            --branch "$FX_DATA_BRANCH" \
            --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data 2>&1) && {
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Clone failed — check if it is a missing-branch error.
          if echo "$clone_output" | grep -qiE "remote branch .* not found|could not find remote branch"; then
            echo "Data branch '$FX_DATA_BRANCH' not found. Skipping weekly report."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Any other error (network, auth, etc.) should fail the job.
          echo "::error::git clone failed: $clone_output"
          exit 1

      - name: Set up Python 3.11
        if: steps.checkout-data.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: code/pyproject.toml

      - name: Install project
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run weekly report
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        run: |
          python scripts/run_fx_weekly_report.py

      - name: Commit and push data branch if changed
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "FX weekly report v2 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:"$FX_DATA_BRANCH"
            echo "Data branch updated with weekly report."
          fi
