name: FX Weekly Report v2

on:
  schedule:
    # Weekly: Monday 10:00 JST = Sunday 01:00 UTC
    # Generates the previous week's report after all daily runs are complete.
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write   # needed to push to fx-daily-data branch

jobs:
  run-weekly-report:
    runs-on: ubuntu-latest

    env:
      FX_DATA_BRANCH: ${{ vars.FX_DATA_BRANCH || 'fx-daily-data' }}
      FX_CSV_OUTPUT_DIR: ${{ github.workspace }}/data/csv
      FX_WEEK_DAYS: '5'

    steps:
      - name: Check out code branch
        uses: actions/checkout@v4
        with:
          path: code

      - name: Check out data branch
        id: checkout-data
        run: |
          git clone \
            --branch "$FX_DATA_BRANCH" \
            --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data \
          || {
            echo "Data branch not found. Skipping weekly report."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        if: steps.checkout-data.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: code/pyproject.toml

      - name: Install project
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run weekly report
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: code
        run: |
          python scripts/run_fx_weekly_report.py

      - name: Commit and push data branch if changed
        if: steps.checkout-data.outputs.skip != 'true'
        working-directory: data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "FX weekly report v2 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:"$FX_DATA_BRANCH"
            echo "Data branch updated with weekly report."
          fi
