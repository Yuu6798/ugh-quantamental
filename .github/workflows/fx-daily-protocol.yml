name: FX Daily Protocol

on:
  schedule:
    # Primary: 14:00 JST = 05:00 UTC (Mon-Fri).
    # Alpha Vantage typically publishes daily bars ~14:00 JST,
    # so this timing avoids the systematic fallback that occurred
    # with the previous 08:00 JST schedule.
    - cron: '0 5 * * 1-5'
    # Retry 1: 16:00 JST = 07:00 UTC (Mon-Fri).
    # If the 14:00 run succeeded, this is a no-op (idempotent).
    - cron: '0 7 * * 1-5'
    # Retry 2 (final): 20:00 JST = 11:00 UTC (Mon-Fri).
    # FX_LAST_RETRY=1 — fail hard if data still unavailable.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write   # needed to push to fx-daily-data branch

jobs:
  run-daily-protocol:
    runs-on: ubuntu-latest

    env:
      # Provider selection (evaluated in order):
      #   FX_DATA_URL set          → custom HttpJsonFxMarketDataProvider
      #   ALPHAVANTAGE_API_KEY set → AlphaVantageXMarketDataProvider (recommended)
      #   neither set              → Yahoo Finance public provider (fallback)
      # Set ALPHAVANTAGE_API_KEY as a repository secret (free key from alphavantage.co).
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      FX_DATA_URL: ${{ secrets.FX_DATA_URL }}
      # Last retry (20:00 JST / 11:00 UTC) and manual dispatch: fail hard on
      # data-fetch errors so CI goes red and the gap is visible.
      FX_LAST_RETRY: ${{ (github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
      FX_DATA_BRANCH: ${{ vars.FX_DATA_BRANCH || 'fx-daily-data' }}
      FX_SQLITE_FILENAME: ${{ vars.FX_SQLITE_FILENAME || 'fx_protocol.db' }}
      FX_THEORY_VERSION: ${{ vars.FX_THEORY_VERSION || 'v2' }}
      FX_ENGINE_VERSION: ${{ vars.FX_ENGINE_VERSION || 'v2' }}
      FX_SCHEMA_VERSION: ${{ vars.FX_SCHEMA_VERSION || 'v1' }}
      FX_PROTOCOL_VERSION: ${{ vars.FX_PROTOCOL_VERSION || 'v1' }}
      FX_WRITE_CSV_EXPORTS: ${{ vars.FX_WRITE_CSV_EXPORTS || '1' }}
      # Absolute path: {workspace}/data/csv lands inside the data-branch checkout.
      # A relative path here would resolve to code/ and never be pushed.
      FX_CSV_OUTPUT_DIR: ${{ vars.FX_CSV_OUTPUT_DIR || format('{0}/data/csv', github.workspace) }}
      FX_DATA_DIR: ${{ github.workspace }}/data

    steps:
      - name: Check out code branch
        uses: actions/checkout@v4
        with:
          path: code

      - name: Check out or create data branch
        run: |
          git clone \
            --branch "$FX_DATA_BRANCH" \
            --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data \
          || (
            git -C code checkout --orphan "$FX_DATA_BRANCH" 2>/dev/null || true
            mkdir -p data
            cd data
            git init
            git remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "# fx-daily-data" > README.md
            git add README.md
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git commit -m "Initialize fx-daily-data branch"
            git push origin HEAD:"$FX_DATA_BRANCH"
          )

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: code/pyproject.toml

      - name: Install project
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run FX daily protocol
        working-directory: code
        run: |
          python scripts/run_fx_daily_protocol.py

      - name: Commit and push data branch if changed
        working-directory: data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "FX daily protocol run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:"$FX_DATA_BRANCH"
            echo "Data branch updated."
          fi
