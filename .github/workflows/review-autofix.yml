name: Review Autofix Bot

on:
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  review-autofix:
    # Skip jobs triggered by actors not in the configured allowlist.
    # This is a cost-optimisation gate only — bot.py performs the authoritative
    # actor check at runtime using the same ALLOWED_BOT_REVIEWERS value.
    # contains() does substring matching on the CSV variable, which is sufficient
    # for bot login names and avoids hardcoding a single bot identity here.
    if: >-
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.comment.user.login)
      ) || (
        github.event_name == 'pull_request_review' &&
        github.event.review.state != 'approved' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.review.user.login)
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: review-autofix-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0
          path: trusted-bot
          # Do not persist credentials in .git/config.  The remote URL is set
          # with GITHUB_TOKEN in the "Configure git author" step instead.
          persist-credentials: false

      - name: Check out PR head branch as data workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          path: pr-head
          # Do not persist credentials in .git/config — same rationale as above.
          # The remote URL is set with GITHUB_TOKEN in the "Configure git author" step.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trusted-bot/pyproject.toml

      - name: Install dependencies
        working-directory: trusted-bot
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff

      - name: Configure git author
        working-directory: pr-head
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mirror the repository expression used in the "Check out PR head
          # branch" step so that origin always points at the repository that
          # was actually checked out (fork or base).  Using GITHUB_REPOSITORY
          # here would rewrite origin to the base repo for fork PRs, causing
          # bot.py to push to the wrong repository when ALLOW_PUSH_ON_FORK=true.
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${HEAD_REPO}.git"

      # Preflight: emit key runtime settings.  Advisory-only — never exits non-zero
      # so that bot.py can always post its outcome regardless of mode.
      - name: Preflight — verify executor environment
        env:
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          EXECUTOR_MODEL: ${{ vars.EXECUTOR_MODEL || 'gpt-4o' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== review-autofix preflight ==="
          echo "BOT_MODE        : ${BOT_MODE}"
          echo "DRY_RUN         : ${DRY_RUN}"
          echo "EXECUTOR_MODEL  : ${EXECUTOR_MODEL}"
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY is not set — executor will fail with openai-api-key-missing."
          else
            echo "OPENAI_API_KEY  : present"
            _status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"${EXECUTOR_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":1}" \
              https://api.openai.com/v1/chat/completions)
            echo "POST /v1/chat/completions (${EXECUTOR_MODEL}) HTTP status: ${_status}"
            if [ "${_status}" != "200" ]; then
              echo "::warning::API key probe failed (status ${_status}) — check OPENAI_API_KEY secret and EXECUTOR_MODEL."
            fi
          fi
          echo "=== preflight OK ==="

      - name: Run review autofix bot
        working-directory: pr-head
        env:
          TRUSTED_SRC: ${{ github.workspace }}/trusted-bot/src
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          TARGET_REVIEWERS: ${{ vars.TARGET_REVIEWERS || '' }}
          ALLOWED_BOT_REVIEWERS: ${{ vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]' }}
          SELF_BOT_ACTORS: ${{ vars.SELF_BOT_ACTORS || 'github-actions[bot]' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          ALLOW_PUSH_ON_FORK: ${{ vars.ALLOW_PUSH_ON_FORK || 'false' }}
          VALIDATION_FORMAT_COMMANDS: ${{ vars.VALIDATION_FORMAT_COMMANDS || '' }}
          VALIDATION_LINT_COMMANDS: ${{ vars.VALIDATION_LINT_COMMANDS || 'ruff check .' }}
          VALIDATION_TYPECHECK_COMMANDS: ${{ vars.VALIDATION_TYPECHECK_COMMANDS || '' }}
          VALIDATION_TEST_COMMANDS: ${{ vars.VALIDATION_TEST_COMMANDS || 'pytest -q' }}
          REPLY_ON_SUCCESS: ${{ vars.REPLY_ON_SUCCESS || 'true' }}
          REPLY_ON_FAILURE: ${{ vars.REPLY_ON_FAILURE || 'true' }}
          AUTO_RESOLVE: ${{ vars.AUTO_RESOLVE || 'false' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          EXECUTOR_MODEL: ${{ vars.EXECUTOR_MODEL || 'gpt-4o' }}
          EXECUTOR_TIMEOUT_SECONDS: ${{ vars.EXECUTOR_TIMEOUT_SECONDS || '900' }}
        run: |
          python - <<'PY'
          import os
          import runpy
          import sys

          trusted_src = os.environ["TRUSTED_SRC"]
          os.environ["PYTHONPATH"] = trusted_src
          sys.path = [trusted_src, *[p for p in sys.path if p not in {"", "."}]]
          runpy.run_module("ugh_quantamental.review_autofix.bot", run_name="__main__")
          PY
