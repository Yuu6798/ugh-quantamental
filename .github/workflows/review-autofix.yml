name: Review Autofix Bot

on:
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  review-autofix:
    # Skip jobs triggered by actors not in the configured allowlist.
    # This is a cost-optimisation gate only — bot.py performs the authoritative
    # actor check at runtime using the same ALLOWED_BOT_REVIEWERS value.
    # contains() does substring matching on the CSV variable, which is sufficient
    # for bot login names and avoids hardcoding a single bot identity here.
    if: >-
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.comment.user.login)
      ) || (
        github.event_name == 'pull_request_review' &&
        github.event.review.state != 'approved' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.review.user.login)
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: review-autofix-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0
          path: trusted-bot

      - name: Check out PR head branch as data workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          path: pr-head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trusted-bot/pyproject.toml

      - name: Install dependencies
        working-directory: trusted-bot
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff

      # Install Node.js so that the @openai/codex CLI can be installed globally.
      # This is required whenever CODEX_EXECUTOR_COMMAND references the `codex` binary
      # (e.g. `codex exec "$(cat "$CODEX_TASK_FILE")"`).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install the OpenAI Codex CLI globally.
      # The `codex` binary is expected by the default CODEX_EXECUTOR_COMMAND value.
      # If a custom command using `npx` or another runner is preferred, this step
      # can be skipped by setting the BOT_MODE variable to `detect_only`; however,
      # the preflight check below will still validate that the first token of
      # CODEX_EXECUTOR_COMMAND is resolvable on PATH before the bot runs.
      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure git author
        working-directory: pr-head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Preflight: emit key runtime settings and verify the executor binary is
      # resolvable before the bot process starts.  A missing binary produces a
      # clear ::error:: annotation instead of a cryptic "exit 127" buried in bot
      # log output.  When CODEX_EXECUTOR_COMMAND is empty the bot will naturally
      # skip execution with reason='codex-command-not-configured'; this step only
      # hard-fails when the variable is non-empty but the binary cannot be found.
      - name: Preflight — verify executor environment
        env:
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
        run: |
          echo "=== review-autofix preflight ==="
          echo "BOT_MODE              : ${BOT_MODE}"
          echo "DRY_RUN               : ${DRY_RUN}"
          if [ -z "${CODEX_EXECUTOR_COMMAND}" ]; then
            echo "CODEX_EXECUTOR_COMMAND: (empty — executor will skip with 'codex-command-not-configured')"
          else
            echo "CODEX_EXECUTOR_COMMAND: (set)"
            # Extract the first executable token from the command string.
            # Leading KEY=value assignments (e.g. OPENAI_API_KEY=... codex exec ...)
            # are valid shell syntax and must be skipped before checking PATH,
            # because the executor runs the full command with shell=True and handles
            # them natively.  Only tokens that do NOT match the KEY=value pattern
            # are considered as the binary name.
            _cmd_token=$(printf '%s' "${CODEX_EXECUTOR_COMMAND}" | \
              awk '{for(i=1;i<=NF;i++){if($i !~ /^[A-Za-z_][A-Za-z0-9_]*=/){print $i; exit}}}')
            if [ -z "${_cmd_token}" ]; then
              echo "executor binary       : (could not determine — skipping PATH check)"
            elif ! command -v "${_cmd_token}" >/dev/null 2>&1; then
              echo "::error::Executor binary '${_cmd_token}' not found on PATH."
              echo "::error::Either the @openai/codex npm package failed to install,"
              echo "::error::or CODEX_EXECUTOR_COMMAND uses a binary that is not available."
              echo "::error::To use npx instead, set: CODEX_EXECUTOR_COMMAND=npx @openai/codex exec \"\$(cat \"\$CODEX_TASK_FILE\")\""
              exit 1
            else
              echo "executor binary       : $(command -v "${_cmd_token}")"
              "${_cmd_token}" --version 2>/dev/null || true
            fi
          fi
          echo "=== preflight OK ==="

      - name: Run review autofix bot
        working-directory: pr-head
        env:
          TRUSTED_SRC: ${{ github.workspace }}/trusted-bot/src
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          TARGET_REVIEWERS: ${{ vars.TARGET_REVIEWERS || '' }}
          ALLOWED_BOT_REVIEWERS: ${{ vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]' }}
          SELF_BOT_ACTORS: ${{ vars.SELF_BOT_ACTORS || 'github-actions[bot]' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          ALLOW_PUSH_ON_FORK: ${{ vars.ALLOW_PUSH_ON_FORK || 'false' }}
          VALIDATION_FORMAT_COMMANDS: ${{ vars.VALIDATION_FORMAT_COMMANDS || '' }}
          VALIDATION_LINT_COMMANDS: ${{ vars.VALIDATION_LINT_COMMANDS || 'ruff check .' }}
          VALIDATION_TYPECHECK_COMMANDS: ${{ vars.VALIDATION_TYPECHECK_COMMANDS || '' }}
          VALIDATION_TEST_COMMANDS: ${{ vars.VALIDATION_TEST_COMMANDS || 'pytest -q' }}
          REPLY_ON_SUCCESS: ${{ vars.REPLY_ON_SUCCESS || 'true' }}
          REPLY_ON_FAILURE: ${{ vars.REPLY_ON_FAILURE || 'true' }}
          AUTO_RESOLVE: ${{ vars.AUTO_RESOLVE || 'false' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
          CODEX_EXECUTOR_TIMEOUT_SECONDS: ${{ vars.CODEX_EXECUTOR_TIMEOUT_SECONDS || '900' }}
        run: |
          python - <<'PY'
          import os
          import runpy
          import sys

          trusted_src = os.environ["TRUSTED_SRC"]
          os.environ["PYTHONPATH"] = trusted_src
          sys.path = [trusted_src, *[p for p in sys.path if p not in {"", "."}]]
          runpy.run_module("ugh_quantamental.review_autofix.bot", run_name="__main__")
          PY
