name: Review Autofix Bot

on:
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  review-autofix:
    # Skip jobs triggered by actors not in the configured allowlist.
    # This is a cost-optimisation gate only — bot.py performs the authoritative
    # actor check at runtime using the same ALLOWED_BOT_REVIEWERS value.
    # contains() does substring matching on the CSV variable, which is sufficient
    # for bot login names and avoids hardcoding a single bot identity here.
    if: >-
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.comment.user.login)
      ) || (
        github.event_name == 'pull_request_review' &&
        github.event.review.state != 'approved' &&
        contains(vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]', github.event.review.user.login)
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: review-autofix-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0
          path: trusted-bot

      - name: Check out PR head branch as data workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          path: pr-head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trusted-bot/pyproject.toml

      - name: Install dependencies
        working-directory: trusted-bot
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff

      # Compute executor gate — three independent conditions must all be true
      # before Node.js / npm install are needed:
      #   1. BOT_MODE is an executing mode (not detect_only / propose_only)
      #   2. DRY_RUN is falsy — normalised case-insensitively to match
      #      config.py _parse_bool ({1,true,yes,on} → dry)
      #   3. CODEX_EXECUTOR_COMMAND is non-empty — when empty, bot.py returns
      #      early with "codex-command-not-configured" and never calls the CLI
      #
      # All three checks are done in shell to avoid GitHub Actions `if:`
      # expression case-sensitivity issues.
      - name: Compute executor gate
        id: gate
        env:
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
        run: |
          _mode=$(printf '%s' "${BOT_MODE}" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          _dry=$(printf '%s'  "${DRY_RUN}"  | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          _install=false
          if [ "${_mode}" != '' ] && \
             [ "${_mode}" != 'detect_only' ] && \
             [ "${_mode}" != 'propose_only' ] && \
             [ -n "${CODEX_EXECUTOR_COMMAND}" ]; then
            case "${_dry}" in
              1|true|yes|on) ;;
              *) _install=true ;;
            esac
          fi
          echo "should_install=${_install}" >> "$GITHUB_OUTPUT"

      # Install Node.js only when the executor gate says execution is likely.
      # detect_only, propose_only, and any DRY_RUN truthy value (case-insensitive)
      # skip this step.
      - name: Set up Node.js
        if: steps.gate.outputs.should_install == 'true'
        # continue-on-error so a transient GitHub CDN failure does not abort
        # the job before bot.py can post its outcome.
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install the Codex CLI in a dedicated step that carries NO secrets.
      # Separating installation from execution means any postinstall hooks in
      # @openai/codex (or its dependency tree) cannot access GITHUB_TOKEN or
      # OPENAI_API_KEY.  The install is skipped in non-executing modes
      # (detect_only, propose_only, DRY_RUN truthy) via the gate output.
      # continue-on-error so a transient npm registry failure does not abort
      # the job before bot.py can post its outcome.
      - name: Install Codex CLI
        if: steps.gate.outputs.should_install == 'true'
        continue-on-error: true
        run: |
          (cd "$GITHUB_WORKSPACE" && npm install -g @openai/codex) \
            || echo "::warning::npm install -g @openai/codex failed; executor will be unavailable."

      - name: Configure git author
        working-directory: pr-head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Preflight: emit key runtime settings and surface a ::warning:: if the
      # executor binary is not resolvable.  This step is intentionally
      # advisory-only and never exits with a non-zero code.
      #
      # Rationale: bot.py has multiple runtime branches (fork PR downgrade,
      # non-actionable classification, …) where the executor is never called
      # even in apply_* modes.  A hard-fail here would abort the job before the
      # bot can post its outcome.  The ::warning:: annotation is still visible
      # in the GitHub Actions summary, replacing the previous cryptic exit-127
      # buried in bot log output, while letting the bot decide for itself
      # whether execution is appropriate.
      - name: Preflight — verify executor environment
        env:
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
        run: |
          echo "=== review-autofix preflight ==="
          echo "BOT_MODE              : ${BOT_MODE}"
          echo "DRY_RUN               : ${DRY_RUN}"

          # Normalise DRY_RUN using the same truthy set as config.py _parse_bool:
          # {1, true, yes, on}.  Used only for the informational "executor will
          # run" line; does not gate any exit.
          _dry_run_norm=$(printf '%s' "${DRY_RUN}" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          case "${_dry_run_norm}" in
            1|true|yes|on) _dry_run_bool=true ;;
            *)              _dry_run_bool=false ;;
          esac

          _likely_execute=false
          if [ "${BOT_MODE}" != "detect_only" ] && \
             [ "${BOT_MODE}" != "propose_only" ] && \
             [ "${_dry_run_bool}" != "true" ]; then
            _likely_execute=true
          fi
          echo "executor likely runs  : ${_likely_execute} (runtime branches may still skip)"

          if [ -z "${CODEX_EXECUTOR_COMMAND}" ]; then
            echo "CODEX_EXECUTOR_COMMAND: (empty — executor will skip with 'codex-command-not-configured')"
          else
            echo "CODEX_EXECUTOR_COMMAND: (set)"
            # Extract the first executable token from the command string.
            # Leading KEY=value assignments (e.g. OPENAI_API_KEY=... codex exec ...)
            # are valid shell syntax and must be skipped before checking PATH,
            # because the executor runs the full command with shell=True and handles
            # them natively.  Only tokens that do NOT match the KEY=value pattern
            # are considered as the binary name.
            _cmd_token=$(printf '%s' "${CODEX_EXECUTOR_COMMAND}" | \
              awk '{for(i=1;i<=NF;i++){if($i !~ /^[A-Za-z_][A-Za-z0-9_]*=/){print $i; exit}}}')
            if [ -z "${_cmd_token}" ]; then
              echo "executor binary       : (could not determine — skipping PATH check)"
            elif ! command -v "${_cmd_token}" >/dev/null 2>&1; then
              # Only emit a warning when execution is actually expected at runtime.
              # In detect_only / propose_only / DRY_RUN modes the executor is never
              # called, so a missing binary is normal and should not clutter the
              # Actions summary with misleading warnings.
              if [ "${_likely_execute}" = "true" ]; then
                echo "::warning::Executor binary '${_cmd_token}' not found on PATH."
                echo "::warning::If execution is expected, ensure @openai/codex installed correctly"
                echo "::warning::or update CODEX_EXECUTOR_COMMAND to use npx @openai/codex exec \"\$(cat \"\$CODEX_TASK_FILE\")\"."
              else
                echo "executor binary       : '${_cmd_token}' not found on PATH (non-executing mode — advisory only)"
              fi
            else
              # Report the resolved path only — do not invoke the binary.
              # Running with --version has no timeout guard and could hang or
              # trigger side effects for executors that don't support that flag.
              echo "executor binary       : $(command -v "${_cmd_token}")"
            fi
          fi
          echo "=== preflight OK ==="

      # TEMPORARY DIAGNOSTIC STEPS — remove once 401 root-cause is confirmed.
      # Step A: curl-level probe — confirms OPENAI_API_KEY is valid.
      # Step B: Codex CLI probe — confirms the CLI itself receives and uses the key.
      # Both steps never fail the job (continue-on-error: true).
      - name: Diagnose — OpenAI auth and executor command
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
        run: |
          echo "=== OpenAI auth probe ==="
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY is empty — secret may not be set in this repository."
          else
            _status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              https://api.openai.com/v1/models)
            echo "GET /v1/models HTTP status: ${_status}"
            if [ "${_status}" = "200" ]; then
              echo "auth probe: OK (key authenticates)"
            else
              echo "::warning::auth probe: FAILED (status ${_status}) — key may be invalid, expired, or lack /v1/responses access."
            fi
          fi

          echo "=== CODEX_EXECUTOR_COMMAND ==="
          if [ -z "${CODEX_EXECUTOR_COMMAND}" ]; then
            echo "CODEX_EXECUTOR_COMMAND: (empty)"
          else
            # Never print the full command — credentials can appear in formats
            # that are hard to mask completely (e.g. --api-key TOKEN, positional
            # arguments, env-prefixed values).  Instead, emit only the binary
            # name (the first non-KEY=value token, safe to log) and a token
            # count so the structure is visible without leaking any values.
            _cmd_token=$(printf '%s' "${CODEX_EXECUTOR_COMMAND}" | \
              awk '{for(i=1;i<=NF;i++){if($i !~ /^[A-Za-z_][A-Za-z0-9_]*=/){print $i; exit}}}')
            _word_count=$(printf '%s' "${CODEX_EXECUTOR_COMMAND}" | wc -w | tr -d ' ')
            echo "CODEX_EXECUTOR_COMMAND: set (${_word_count} token(s); binary='${_cmd_token}')"
          fi
          echo "=== diagnostic done ==="

      # TEMPORARY — Codex CLI auth probe.
      # Runs only when execution is expected (gate=true).  Installs codex
      # (same path as the bot step), then exercises the real CLI with a
      # trivial prompt so we can observe whether it authenticates or exits 1.
      # Output of the codex subprocess is suppressed; only the exit code is
      # printed to avoid leaking any LLM response content to the log.
      - name: Diagnose — Codex CLI auth probe
        if: steps.gate.outputs.should_install == 'true'
        continue-on-error: true
        working-directory: pr-head
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
          CODEX_EXECUTOR_TIMEOUT_SECONDS: ${{ vars.CODEX_EXECUTOR_TIMEOUT_SECONDS || '900' }}
          _CODEX_INSTALL_NEEDED: ${{ steps.gate.outputs.should_install }}
        run: |
          echo "=== Codex CLI auth probe ==="

          # Codex was installed in the dedicated "Install Codex CLI" step where
          # no secrets are present.  Here we only need to add the npm global
          # bin directory to PATH so the binary is resolvable.
          if [ "${_CODEX_INSTALL_NEEDED}" = "true" ]; then
            if command -v npm >/dev/null 2>&1; then
              export PATH="$(npm prefix -g)/bin:$PATH"
            else
              echo "::warning::npm not found — codex binary may not be on PATH."
            fi
          fi

          # Guard: OPENAI_API_KEY must be present (never print value).
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY is empty in this step — Codex will fail with 401."
            exit 0
          fi
          echo "OPENAI_API_KEY : present"

          # Guard: codex binary must be resolvable after install.
          if ! command -v codex >/dev/null 2>&1; then
            echo "::warning::codex binary not found after install attempt — probe cannot run."
            exit 0
          fi
          echo "codex binary   : $(command -v codex)"

          # Guard: executor command must be configured.
          if [ -z "${CODEX_EXECUTOR_COMMAND}" ]; then
            echo "CODEX_EXECUTOR_COMMAND: (empty) — probe skipped."
            exit 0
          fi

          # Run the actual executor command with a trivial prompt.
          # CODEX_TASK_FILE is injected exactly as the bot step does it.
          # stdout/stderr from codex are suppressed to avoid leaking LLM output.
          _probe_file=$(mktemp)
          printf 'Reply with exactly: OK' > "${_probe_file}"
          _probe_exit=0
          CODEX_TASK_FILE="${_probe_file}" \
            timeout "${CODEX_EXECUTOR_TIMEOUT_SECONDS:-30}" \
            sh -c "${CODEX_EXECUTOR_COMMAND}" > /tmp/codex-probe-out.txt 2>&1 \
            || _probe_exit=$?
          rm -f "${_probe_file}"

          echo "codex-cli-auth-probe: exit_code=${_probe_exit} (0=OK, same cwd as executor)"
          if [ "${_probe_exit}" != "0" ]; then
            echo "::warning::Codex CLI probe failed (exit ${_probe_exit}) — ran from pr-head, same cwd as real executor."
            echo "::warning::curl /v1/models returned 200, so the key is valid at HTTP level."
            echo "::warning::Remaining causes: (1) Codex CLI auth handling differs from raw HTTP;"
            echo "::warning::(2) key scope lacks /v1/responses permission; (3) command invocation"
            echo "::warning::differences between probe and real executor path."
          fi
          echo "=== Codex CLI auth probe done ==="

      - name: Run review autofix bot
        working-directory: pr-head
        env:
          TRUSTED_SRC: ${{ github.workspace }}/trusted-bot/src
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required by the Codex CLI to authenticate with the OpenAI API.
          # Store the key as a repository secret named OPENAI_API_KEY.
          # Without this the executor returns HTTP 401 ("Missing bearer or
          # basic authentication in header") even when the binary is installed.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BOT_MODE: ${{ vars.BOT_MODE || 'detect_only' }}
          TARGET_REVIEWERS: ${{ vars.TARGET_REVIEWERS || '' }}
          ALLOWED_BOT_REVIEWERS: ${{ vars.ALLOWED_BOT_REVIEWERS || 'chatgpt-codex-connector[bot]' }}
          SELF_BOT_ACTORS: ${{ vars.SELF_BOT_ACTORS || 'github-actions[bot]' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          ALLOW_PUSH_ON_FORK: ${{ vars.ALLOW_PUSH_ON_FORK || 'false' }}
          VALIDATION_FORMAT_COMMANDS: ${{ vars.VALIDATION_FORMAT_COMMANDS || '' }}
          VALIDATION_LINT_COMMANDS: ${{ vars.VALIDATION_LINT_COMMANDS || 'ruff check .' }}
          VALIDATION_TYPECHECK_COMMANDS: ${{ vars.VALIDATION_TYPECHECK_COMMANDS || '' }}
          VALIDATION_TEST_COMMANDS: ${{ vars.VALIDATION_TEST_COMMANDS || 'pytest -q' }}
          REPLY_ON_SUCCESS: ${{ vars.REPLY_ON_SUCCESS || 'true' }}
          REPLY_ON_FAILURE: ${{ vars.REPLY_ON_FAILURE || 'true' }}
          AUTO_RESOLVE: ${{ vars.AUTO_RESOLVE || 'false' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          CODEX_EXECUTOR_COMMAND: ${{ vars.CODEX_EXECUTOR_COMMAND || '' }}
          CODEX_EXECUTOR_TIMEOUT_SECONDS: ${{ vars.CODEX_EXECUTOR_TIMEOUT_SECONDS || '900' }}
          # Passed from the gate step so the just-in-time install below can
          # skip itself in detect_only / propose_only / dry-run modes.
          _CODEX_INSTALL_NEEDED: ${{ steps.gate.outputs.should_install }}
        run: |
          # Codex was installed in the dedicated "Install Codex CLI" step where
          # no secrets are present (P1 security fix: installation must not run
          # in an environment that holds GITHUB_TOKEN or OPENAI_API_KEY).
          # Here we only add the npm global bin directory to PATH so the binary
          # is resolvable.  The guard prevents a hard-fail when npm itself is
          # unavailable (P2 fix: unconditional `npm prefix -g` could abort this
          # step before bot.py runs even when the install step had already
          # soft-failed with continue-on-error).
          if [ "${_CODEX_INSTALL_NEEDED}" = "true" ]; then
            if command -v npm >/dev/null 2>&1; then
              export PATH="$(npm prefix -g)/bin:$PATH"
            else
              echo "::warning::npm not found — codex binary may not be on PATH; executor may fail."
            fi
          fi

          python - <<'PY'
          import os
          import runpy
          import sys

          trusted_src = os.environ["TRUSTED_SRC"]
          os.environ["PYTHONPATH"] = trusted_src
          sys.path = [trusted_src, *[p for p in sys.path if p not in {"", "."}]]
          runpy.run_module("ugh_quantamental.review_autofix.bot", run_name="__main__")
          PY
