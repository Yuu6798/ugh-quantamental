# semantic-ci target.yaml — Phase 2 analytics_annotations split
intent: "Extract labeled-observations builder + manual-annotation loading + auto event-tag derivation out of analytics_annotations.py (994 LOC) into a new fx_protocol/labeled_observations.py. analytics_annotations re-exports the moved symbols so existing import paths keep working. No behavior change."
change:
  primary_kind: refactor
  allowed_secondary_kinds:
    - test_update
  scope:
    files: []
    modules:
      # New canonical module (substrate for weekly / monthly review)
      - ugh_quantamental.fx_protocol.labeled_observations
      # Module the content is split out of; now a slimmer
      # AI-draft + scoreboard + orchestrator concern.
      - ugh_quantamental.fx_protocol.analytics_annotations
authorship:
  authors:
    - identity: "claude-code-refactor-phase2"
  declared_at: "2026-05-08T00:00:00Z"
# All previously-public symbols (LABELED_OBSERVATION_FIELDNAMES,
# load_manual_annotations, build_labeled_observations) still resolve at
# their original ``analytics_annotations.<name>`` path via re-export so
# automation, analytics_rebuild, the package __init__, and tests do not
# need to update import paths. semantic-ci's static analysis treats a
# moved definition as a fqn change, declared explicitly here.
api_surface:
  allow_changes:
    # New canonical home — added intentionally as the deliverable.
    - fqn: "fx_protocol.labeled_observations.LABELED_OBSERVATION_FIELDNAMES"
    - fqn: "fx_protocol.labeled_observations.load_manual_annotations"
    - fqn: "fx_protocol.labeled_observations.build_labeled_observations"
    # Symbols whose definition moved out of analytics_annotations
    # (still resolvable at the original path via re-export).
    - fqn: "fx_protocol.analytics_annotations.LABELED_OBSERVATION_FIELDNAMES"
    - fqn: "fx_protocol.analytics_annotations.load_manual_annotations"
    - fqn: "fx_protocol.analytics_annotations.build_labeled_observations"
constraints: []
